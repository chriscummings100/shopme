<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 14px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      margin: 0;
    }
    h1 { font-size: 15px; margin: 0 0 10px 0; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 6px;
      background: #f3f4f6;
      margin-bottom: 10px;
    }
    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #ef4444;
    }
    .dot.connected { background: #22c55e; }
    table { width: 100%; border-collapse: collapse; }
    td { padding: 3px 0; vertical-align: top; }
    td:first-child { color: #6b7280; width: 80px; }
    td:last-child { font-family: monospace; font-size: 11px; word-break: break-all; }
    .none { color: #9ca3af; font-style: italic; font-family: system-ui; }
  </style>
</head>
<body>
  <h1>ShopMe</h1>
  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="label">Checking…</span>
  </div>
  <table id="info"></table>
  <script src="dist/popup.js"></script>
</body>
</html>
