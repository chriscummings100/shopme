<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 260px;
      padding: 16px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      margin: 0;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-radius: 6px;
      background: #f3f4f6;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
    }
    .dot.connected {
      background: #22c55e;
    }
    .info {
      margin-top: 8px;
      font-size: 12px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <h1>ShopMe</h1>
  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="label">Checking...</span>
  </div>
  <div class="info" id="info"></div>
  <script src="dist/popup.js"></script>
</body>
</html>
